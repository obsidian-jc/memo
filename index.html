<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>원베일리 시설일지</title>

<!-- 홈 화면에 설치했을 때 "앱"처럼 보이게 하는 설정들 -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#16324A">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="시설일지">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16324A; --ink-2:#274C6B;
    --paper:#EEF1EF; --paper-2:#E3E8E4;
    --surface:#FFFFFF; --line:#D2D9D3; --line-strong:#AAB6AC;
    --warn:#C84E26; --warn-bg:#FBE9E2;
    --progress:#B8841A; --progress-bg:#FBF0DA;
    --ok:#2F6B4F; --ok-bg:#E3EFE8;
    --notion:#5B4636; --notion-bg:#EFE7DE;
    --shadow: 0 1px 2px rgba(22,50,74,0.06), 0 2px 8px rgba(22,50,74,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'IBM Plex Sans KR', -apple-system, 'Malgun Gothic', sans-serif;
    background:var(--paper); color:var(--ink);
    background-image:linear-gradient(var(--paper-2) 1px, transparent 1px),linear-gradient(90deg, var(--paper-2) 1px, transparent 1px);
    background-size:28px 28px; min-height:100vh;
  }
  .mono{font-family:'IBM Plex Mono','Consolas',monospace;}
  #app{display:flex; min-height:100vh;}
  .sidebar{width:220px; flex-shrink:0; background:var(--ink); color:#EAF0EE; display:flex; flex-direction:column; padding:20px 0;}
  .brand{padding:0 20px 18px 20px; border-bottom:1px solid rgba(255,255,255,0.12); margin-bottom:10px;}
  .brand .title{font-weight:700; font-size:17px; letter-spacing:0.3px;}
  .brand .sub{font-family:'IBM Plex Mono',monospace; font-size:11px; opacity:0.6; margin-top:3px;}
  .nav-item{display:flex; align-items:center; gap:10px; padding:11px 20px; cursor:pointer; font-size:14.5px; color:#CBD8D3; border-left:3px solid transparent; transition:background .15s;}
  .nav-item:hover{background:rgba(255,255,255,0.06);}
  .nav-item.active{background:rgba(255,255,255,0.1); color:#fff; border-left-color:var(--progress);}
  .nav-icon{font-family:'IBM Plex Mono',monospace; font-size:12px; width:18px; text-align:center; opacity:0.85;}
  .sidebar-footer{margin-top:auto; padding:14px 20px 0; font-size:11px; color:rgba(255,255,255,0.4); font-family:'IBM Plex Mono',monospace;}
  .main{flex:1; padding:28px 36px; max-width:1100px;}
  .page-header{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:18px; flex-wrap:wrap; gap:10px;}
  .page-title{font-size:21px; font-weight:700;}
  .page-desc{font-size:13px; color:#5B6E66; margin-top:2px;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:6px; box-shadow:var(--shadow);}
  .stat-row{display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap;}
  .stat-chip{background:var(--surface); border:1px solid var(--line); border-radius:6px; padding:10px 16px; min-width:120px;}
  .stat-chip .num{font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:600;}
  .stat-chip .label{font-size:12px; color:#5B6E66; margin-top:2px;}
  .stat-chip.warn .num{color:var(--warn);}
  .stat-chip.progress .num{color:var(--progress);}
  button{font-family:inherit; cursor:pointer;}
  .btn{border:1px solid var(--line-strong); background:var(--surface); color:var(--ink); padding:8px 14px; border-radius:5px; font-size:13.5px; font-weight:500;}
  .btn:hover{background:#F5F7F5;}
  .btn-primary{background:var(--ink); color:#fff; border-color:var(--ink);}
  .btn-primary:hover{background:var(--ink-2);}
  .btn-notion{background:var(--notion); color:#fff; border-color:var(--notion);}
  .btn-notion:hover{opacity:0.9;}
  .btn-danger{color:var(--warn); border-color:var(--warn);}
  .btn-danger:hover{background:var(--warn-bg);}
  .btn-sm{padding:5px 10px; font-size:12.5px;}
  .btn-ghost{border:none; background:none; color:#5B6E66;}
  .btn-ghost:hover{color:var(--ink); text-decoration:underline;}
  input, select, textarea{font-family:inherit; font-size:13.5px; padding:8px 10px; border:1px solid var(--line-strong); border-radius:5px; background:#fff; color:var(--ink); width:100%;}
  input:focus, select:focus, textarea:focus{outline:2px solid var(--ink-2); outline-offset:1px;}
  label{font-size:12.5px; color:#5B6E66; font-weight:500; display:block; margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .field-row{display:flex; gap:10px;}
  .field-row > .field{flex:1;}
  .stamp{display:inline-flex; align-items:center; gap:4px; font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; letter-spacing:0.06em; padding:3px 9px; border-radius:3px; border:1.5px dashed currentColor; transform:rotate(-1.5deg); text-transform:uppercase;}
  .stamp.s-고장{color:var(--warn); background:var(--warn-bg);}
  .stamp.s-수리중{color:var(--progress); background:var(--progress-bg);}
  .stamp.s-완료{color:var(--ok); background:var(--ok-bg);}
  .stamp.s-notion{color:var(--notion); background:var(--notion-bg); border-style:solid;}
  .day-layout{display:flex; gap:20px;}
  .day-side{width:200px; flex-shrink:0;}
  .day-list{max-height:560px; overflow-y:auto; border:1px solid var(--line); border-radius:6px; background:var(--surface);}
  .day-list-item{padding:9px 12px; font-size:13px; cursor:pointer; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;}
  .day-list-item:hover{background:#F5F7F5;}
  .day-list-item.active{background:var(--paper-2); font-weight:600;}
  .day-list-item .cnt{font-family:'IBM Plex Mono',monospace; font-size:11px; color:#888;}
  .day-main{flex:1;}
  .entry-card{background:var(--surface); border:1px solid var(--line); border-radius:6px; padding:12px 14px; margin-bottom:9px; cursor:pointer;}
  .entry-card:hover{border-color:var(--line-strong);}
  .entry-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .entry-loc{font-size:12px; color:var(--ink-2); font-weight:600;}
  .entry-cat{display:inline-block; font-size:11px; color:#5B6E66; background:var(--paper-2); padding:1px 7px; border-radius:3px; margin-left:6px;}
  .entry-content{font-size:13.5px; margin-top:5px; color:#2A3B33; white-space:pre-wrap;}
  .entry-files{margin-top:6px; display:flex; flex-wrap:wrap; gap:5px;}
  .entry-file-chip{font-size:11px; background:var(--paper-2); border-radius:3px; padding:2px 7px; color:#5B6E66;}
  .badges{display:flex; gap:5px; align-items:center;}
  .empty-state{text-align:center; padding:50px 20px; color:#8a958e; font-size:13.5px; border:1px dashed var(--line-strong); border-radius:6px; background:#fafbfa;}
  .modal-overlay{position:fixed; inset:0; background:rgba(22,50,74,0.35); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .modal{background:var(--surface); border-radius:8px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:0 10px 40px rgba(0,0,0,0.2);}
  .modal-head{padding:16px 20px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;}
  .modal-head .t{font-weight:700; font-size:15.5px;}
  .modal-body{padding:18px 20px;}
  .modal-foot{padding:14px 20px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:8px; flex-wrap:wrap;}
  .close-x{background:none; border:none; font-size:18px; color:#888; cursor:pointer; line-height:1;}
  .checkbox-row{display:flex; align-items:center; gap:8px; margin-bottom:12px;}
  .checkbox-row input{width:auto;}
  .checkbox-row label{margin:0; font-size:13.5px; color:var(--ink); font-weight:500;}
  .issue-box{background:var(--paper-2); border:1px solid var(--line); border-radius:6px; padding:12px; margin-top:8px;}
  .issue-row{background:var(--surface); border:1px solid var(--line); border-radius:6px; padding:12px 14px; margin-bottom:8px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;}
  .issue-row:hover{border-color:var(--line-strong);}
  .issue-row .left{display:flex; flex-direction:column; gap:3px;}
  .issue-title{font-weight:600; font-size:14px;}
  .issue-loc{font-size:12px; color:#5B6E66;}
  .section-label{font-size:12px; font-weight:700; color:#5B6E66; text-transform:uppercase; letter-spacing:0.05em; margin:18px 0 8px;}
  details.completed-group summary{cursor:pointer; font-size:13px; color:#5B6E66; padding:6px 0; font-weight:600;}
  .timeline{margin-top:10px; border-left:2px solid var(--line-strong); padding-left:14px;}
  .timeline-item{margin-bottom:14px; position:relative;}
  .timeline-item:before{content:''; position:absolute; left:-19px; top:4px; width:8px; height:8px; border-radius:50%; background:var(--ink-2);}
  .timeline-date{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#5B6E66;}
  .timeline-note{font-size:13.5px; margin-top:3px; white-space:pre-wrap;}
  .floor-card{margin-bottom:10px; background:var(--surface); border:1px solid var(--line); border-radius:6px; overflow:hidden;}
  .floor-head{padding:11px 14px; display:flex; justify-content:space-between; align-items:center; background:#F6F7F6; cursor:pointer;}
  .floor-head .name{font-weight:700; font-size:14px;}
  .room-list{padding:4px 14px 10px;}
  .room-item{padding:7px 10px; font-size:13px; border-radius:4px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;}
  .room-item:hover{background:var(--paper-2);}
  .add-inline{display:flex; gap:6px; padding:8px 14px;}
  .add-inline input{flex:1;}
  .breadcrumb{font-size:12px; color:#5B6E66; margin-bottom:6px;}
  .breadcrumb a{color:var(--ink-2); cursor:pointer; text-decoration:none;}
  .breadcrumb a:hover{text-decoration:underline;}
  .pickrow{display:flex; gap:8px;}
  .pick{flex:1; padding:9px 4px; text-align:center; border:2px solid var(--line-strong); border-radius:6px; background:#fff; cursor:pointer; font-size:13px;}
  .pick.selected{background:var(--ink); color:#fff; border-color:var(--ink);}
  .export-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media (max-width:760px){
    .export-grid{grid-template-columns:1fr;}
    .day-layout{flex-direction:column;}
    .day-side{width:100%;}
    .main{padding:16px 14px calc(84px + env(safe-area-inset-bottom));}
    #app{flex-direction:column;}
    .sidebar{
      position:fixed; bottom:0; left:0; right:0; top:auto; width:100%;
      flex-direction:row; justify-content:space-around; align-items:center;
      padding:6px 4px calc(6px + env(safe-area-inset-bottom));
      z-index:40; box-shadow:0 -2px 12px rgba(0,0,0,0.15);
    }
    .brand{display:none;}
    .sidebar-footer{display:none;}
    .nav-item{flex-direction:column; gap:2px; padding:6px 4px; font-size:10.5px; border-left:none; border-radius:8px; flex:1; text-align:center;}
    .nav-item.active{border-left:none; background:rgba(255,255,255,0.14);}
    .nav-icon{width:auto; font-size:17px;}
    input, select, textarea, .btn{font-size:16px;} /* 16px 미만이면 iOS가 확대해버려서 16px로 고정 */
    .page-title{font-size:19px;}
    .modal{max-height:92vh;}
  }
  .export-card h3{font-size:14.5px; margin:0 0 6px;}
  .export-card p{font-size:12.5px; color:#5B6E66; margin:0 0 12px; line-height:1.5;}
  .folder-status{font-family:'IBM Plex Mono',monospace; font-size:12px; padding:7px 10px; background:var(--paper-2); border-radius:4px; margin-bottom:10px; word-break:break-all;}
  .radio-row{display:flex; gap:14px; margin-bottom:10px;}
  .radio-row label{display:flex; align-items:center; gap:5px; font-size:13px; color:var(--ink); font-weight:400;}
  .radio-row input{width:auto;}
  .note-box{font-size:12px; color:#8a958e; background:#fafbfa; border:1px dashed var(--line-strong); border-radius:5px; padding:8px 10px; margin-top:10px; line-height:1.5;}
  .toast{position:fixed; bottom:24px; right:24px; background:var(--ink); color:#fff; padding:11px 18px; border-radius:6px; font-size:13.5px; box-shadow:var(--shadow); z-index:100; opacity:0; transform:translateY(8px); transition:all .25s; max-width:360px; white-space:pre-line;}
  .toast.show{opacity:1; transform:translateY(0);}
  .file-import-input{display:none;}
  .file-list-preview{margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;}
  .file-chip{display:inline-flex; align-items:center; gap:6px; background:var(--paper-2); border:1px solid var(--line); border-radius:14px; padding:4px 6px 4px 10px; font-size:12px;}
  .file-chip .x{cursor:pointer; color:#888; font-size:12px;}
  .file-chip .x:hover{color:var(--warn);}
  .fab{display:none;}
  @media (max-width:760px){
    .fab{
      display:flex; align-items:center; justify-content:center;
      position:fixed; right:16px; bottom:calc(68px + env(safe-area-inset-bottom));
      width:56px; height:56px; border-radius:50%; background:var(--progress); color:#fff;
      font-size:28px; line-height:1; border:none; box-shadow:0 4px 14px rgba(0,0,0,0.28); z-index:41;
    }
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function(){
"use strict";

/* ---------------- STATE ---------------- */
let DATA = { entries: [], issues: [], categories: ['점검','수리','메모'], locations: [] };
let SETTINGS = { workerUrl:'', inboxPageId:'', autoOpenDir:false };
let UI = { tab:'daily', selectedDate: todayStr(), selectedIssueId:null, selectedLocId:null, openFloors:{} };
let dirHandle = null;
let pendingFiles = []; // File objects staged for the entry currently being edited

function todayStr(){ const d = new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n){ return n<10 ? '0'+n : ''+n; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

/* ---------------- STORAGE ---------------- */
function loadData(){
  try{
    const raw = localStorage.getItem('facility-data');
    if(raw){ DATA = Object.assign({entries:[],issues:[],categories:['점검','수리','메모'],locations:[]}, JSON.parse(raw)); }
    const rawS = localStorage.getItem('facility-settings');
    if(rawS){ SETTINGS = Object.assign(SETTINGS, JSON.parse(rawS)); }
  }catch(e){}
}
let saveTimer=null;
function saveData(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{ localStorage.setItem('facility-data', JSON.stringify(DATA)); }
    catch(e){ showToast('저장 중 오류가 발생했습니다'); }
  }, 150);
}
function saveSettings(){
  try{ localStorage.setItem('facility-settings', JSON.stringify(SETTINGS)); }catch(e){}
}

/* ---------------- HELPERS ---------------- */
function locLabel(loc){ if(!loc) return '(알수없음)'; return loc.room ? (loc.floor+' / '+loc.room) : (loc.floor+' (전체)'); }
function getLoc(id){ return DATA.locations.find(l=>l.id===id); }
function getIssue(id){ return DATA.issues.find(i=>i.id===id); }
function entriesForIssue(issueId){ return DATA.entries.filter(e=>e.issueId===issueId).sort((a,b)=> (a.date+a._t).localeCompare(b.date+b._t)); }
function issueCurrentStatus(issueId){ const es=entriesForIssue(issueId); if(es.length===0) return '고장'; return es[es.length-1].issueStatus||'고장'; }
function entriesForLocation(locId){ return DATA.entries.filter(e=>e.locationId===locId).sort((a,b)=> (b.date+b._t).localeCompare(a.date+a._t)); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'), 3200); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------------- RENDER ROOT ---------------- */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="sidebar">
      <div class="brand"><div class="title">원베일리 시설일지</div><div class="sub">FACILITY LOG SYSTEM</div></div>
      ${navItem('daily','◧','일일일지')}
      ${navItem('issues','▲','이슈관리')}
      ${navItem('locations','▣','위치')}
      ${navItem('export','⇄','내보내기')}
      ${navItem('settings','✦','설정')}
      <div class="sidebar-footer">v1.0 · 로컬저장 + 노션연동</div>
    </div>
    <div class="main" id="main"></div>
    <button class="fab" data-action="open-entry-form" aria-label="항목 추가">+</button>
  `;
  renderMain();
  bindGlobalEvents();
}
function navItem(key, icon, label){
  return `<div class="nav-item ${UI.tab===key?'active':''}" data-nav="${key}"><span class="nav-icon">${icon}</span><span>${label}</span></div>`;
}
function renderMain(){
  const main = document.getElementById('main');
  if(UI.tab==='daily') main.innerHTML = renderDaily();
  else if(UI.tab==='issues') main.innerHTML = renderIssues();
  else if(UI.tab==='locations') main.innerHTML = renderLocations();
  else if(UI.tab==='export') main.innerHTML = renderExport();
  else if(UI.tab==='settings') main.innerHTML = renderSettings();
}

/* ---------------- DAILY LOG TAB ---------------- */
function renderDaily(){
  const dates = [...new Set(DATA.entries.map(e=>e.date))].sort().reverse();
  if(!dates.includes(UI.selectedDate)) dates.unshift(UI.selectedDate);
  const dayEntries = DATA.entries.filter(e=>e.date===UI.selectedDate).sort((a,b)=>a._t.localeCompare(b._t));
  const thisMonth = UI.selectedDate.slice(0,7);
  const monthCount = DATA.entries.filter(e=>e.date.slice(0,7)===thisMonth).length;
  const activeIssues = DATA.issues.filter(i=>issueCurrentStatus(i.id)!=='완료').length;

  return `
    <div class="page-header">
      <div><div class="page-title">일일일지</div><div class="page-desc">날짜를 선택하고 업무 항목을 기록하세요. 사진 첨부, 노션 전송이 한 번에 됩니다.</div></div>
      <button class="btn btn-primary" data-action="open-entry-form">+ 항목 추가</button>
    </div>
    <div class="stat-row">
      <div class="stat-chip"><div class="num mono">${monthCount}</div><div class="label">이번달(${thisMonth}) 기록</div></div>
      <div class="stat-chip warn"><div class="num mono">${activeIssues}</div><div class="label">진행중 이슈</div></div>
      <div class="stat-chip"><div class="num mono">${DATA.locations.length}</div><div class="label">등록 위치</div></div>
    </div>
    <div class="day-layout">
      <div class="day-side">
        <div class="field"><input type="date" id="date-picker" value="${UI.selectedDate}"></div>
        <div class="day-list">
          ${dates.length===0 ? '<div style="padding:14px;font-size:12.5px;color:#888;">기록 없음</div>' :
            dates.map(d=>{
              const cnt = DATA.entries.filter(e=>e.date===d).length;
              return `<div class="day-list-item ${d===UI.selectedDate?'active':''}" data-pick-date="${d}"><span>${d}</span><span class="cnt mono">${cnt}</span></div>`;
            }).join('')}
        </div>
      </div>
      <div class="day-main">
        ${dayEntries.length===0 ? `<div class="empty-state">이 날짜에 기록된 항목이 없습니다.</div>` : dayEntries.map(e=>renderEntryCard(e)).join('')}
      </div>
    </div>
  `;
}
function renderEntryCard(e){
  const loc = getLoc(e.locationId);
  let badge = '';
  if(e.isIssue) badge += `<span class="stamp s-${e.issueStatus}">${e.issueStatus}</span>`;
  if(e.sentToNotion) badge += `<span class="stamp s-notion">노션</span>`;
  const files = (e.files||[]).map(f=>`<span class="entry-file-chip">📎 ${esc(f)}</span>`).join('');
  return `
    <div class="entry-card" data-edit-entry="${e.id}">
      <div class="entry-top">
        <div><span class="entry-loc">${esc(locLabel(loc))}</span>${e.category?`<span class="entry-cat">${esc(e.category)}</span>`:''}</div>
        <div class="badges">${badge}</div>
      </div>
      <div class="entry-content">${esc(e.content)}</div>
      ${files?`<div class="entry-files">${files}</div>`:''}
    </div>
  `;
}

/* Entry form modal */
let formEntryContext = null;
function openEntryForm(existingId){
  const existing = existingId ? DATA.entries.find(e=>e.id===existingId) : null;
  formEntryContext = existing;
  pendingFiles = [];
  const date = existing ? existing.date : UI.selectedDate;
  const floors = [...new Set(DATA.locations.map(l=>l.floor))];
  const locOptions = floors.map(f=>{
    const floorLoc = DATA.locations.find(l=>l.floor===f && !l.room);
    const rooms = DATA.locations.filter(l=>l.floor===f && l.room);
    let opts = '';

async function saveEntryFromForm(existingId){
  const date = document.getElementById('f-date').value;
  const category = document.getElementById('f-category').value;
  const locSel = document.getElementById('f-location');
  const locationId = locSel ? locSel.value : '';
  const content = document.getElementById('f-content').value.trim();
  const isIssue = document.getElementById('f-isissue').checked;
  const wantNotion = document.getElementById('f-sendnotion').checked;

  if(!locationId){ showToast('위치를 선택해주세요'); return; }
  if(!content){ showToast('내용을 입력해주세요'); return; }

  let issueId=null, issueStatus=null;
  const entryObj = existingId ? DATA.entries.find(x=>x.id===existingId) : null;
  if(isIssue){
    const mode = document.getElementById('f-issue-mode').value;
    issueStatus = document.getElementById('f-issue-status').value;
    if(mode==='new'){
      const title = document.getElementById('f-issue-title').value.trim() || content.slice(0,30);
      if(entryObj && entryObj.issueId){
        const existingIssue = getIssue(entryObj.issueId);
        if(existingIssue){ existingIssue.title=title; issueId=existingIssue.id; }
        else { const ni={id:uid(),title,locationId,createdDate:date}; DATA.issues.push(ni); issueId=ni.id; }
      } else { const ni={id:uid(),title,locationId,createdDate:date}; DATA.issues.push(ni); issueId=ni.id; }
    } else { issueId = document.getElementById('f-issue-select').value; }
  }

  // Save attached files: prefer local OneDrive folder; if unavailable (e.g. mobile/iPhone),
  // upload photos straight to Notion so nothing gets lost.
  let savedFileNames = existingId ? (entryObj.files||[]).slice() : [];
  const loc = getLoc(locationId);
  if(pendingFiles.length){
    if(dirHandle){
      showToast('첨부 파일 저장 중...');
      const entryDirName = sanitizeFilename(date + '_' + (loc?(loc.room||loc.floor):'미지정') + '_' + content.slice(0,16));
      try{
        const attachRoot = await getOrCreateDir(dirHandle, '첨부');
        const entryDir = await getOrCreateDir(attachRoot, entryDirName);
        for(const f of pendingFiles){
          await writeFileBinary(entryDir, f.name, f);
          savedFileNames.push(f.name);
        }
      }catch(err){ showToast('첨부 파일 저장 실패: 저장 위치 권한을 설정 탭에서 다시 확인해주세요'); }
    } else if(SETTINGS.workerUrl && SETTINGS.inboxPageId){
      showToast('사진을 노션에 업로드 중... (' + pendingFiles.length + '장)');
      const caption = `[${date}] ${loc?locLabel(loc):''} 첨부 사진 — ${content.slice(0,60)}`;
      let uploadedCount = 0;
      for(const f of pendingFiles){
        const ok = await uploadPhotoToNotion(f, caption);
        if(ok){ savedFileNames.push(f.name); uploadedCount++; }
      }
      if(uploadedCount>0) showToast(`사진 ${uploadedCount}/${pendingFiles.length}장을 노션에 저장했습니다`);
      if(uploadedCount<pendingFiles.length) showToast('일부 사진은 노션 업로드에 실패했습니다');
    } else {
      savedFileNames = savedFileNames.concat(pendingFiles.map(f=>f.name));
      showToast('참고: 저장 위치도 노션 연동도 설정되지 않아 파일명만 기록되고 실제 파일은 저장되지 않았습니다');
    }
  }

  let newEntry;
  if(existingId){
    Object.assign(entryObj, {date, category, locationId, content, isIssue, issueId, issueStatus, files:savedFileNames});
    newEntry = entryObj;
  } else {
    newEntry = {id:uid(), date, category, locationId, content, isIssue, issueId, issueStatus, files:savedFileNames, sentToNotion:false, _t:new Date().toISOString()};
    DATA.entries.push(newEntry);
  }

  if(wantNotion && SETTINGS.workerUrl){
    let line = `[${date}] ${locLabel(loc)}`;
    if(category) line += ` · ${category}`;
    if(isIssue) line += ` (${issueStatus})`;
    line += ` — ${content}`;
    if(savedFileNames.length) line += ` [첨부 ${savedFileNames.length}건]`;
    const ok = await sendToNotionInbox(line);
    newEntry.sentToNotion = ok;
    if(!ok) showToast('저장은 완료됐지만 노션 전송에 실패했습니다. 설정을 확인해주세요.');
  }

  saveData(); closeModal(); UI.selectedDate=date; render();
  showToast('저장되었습니다' + (newEntry.sentToNotion?' (노션 전송 완료)':''));
}

  DATA.entries = DATA.entries.filter(e=>e.id!==id);

      </p>
      <div class="field"><label>Worker URL</label><input type="text" id="s-worker-url" placeholder="https://your-worker.your-subdomain.workers.dev" value="${esc(SETTINGS.workerUrl)}"></div>

      <button class="btn btn-primary btn-sm" data-action="save-notion-settings">저장</button>
      <button class="btn btn-sm" data-action="test-notion">연결 테스트</button>
      <div class="note-box">📱 폰(아이폰 포함)에서는 저장 위치(원드라이브) 폴더 선택이 안 되지만, 노션 연동이 설정되어 있으면 사진이 자동으로 노션 받은편지함에 업로드됩니다. 파일당 20MB까지 지원합니다.</div>
    </div>

    <div class="card" style="padding:16px;">
      <h3 style="margin:0 0 6px; font-size:14.5px;">🏷 카테고리</h3>
      <div style="margin-bottom:10px;">${catChips || '<span style="font-size:12.5px;color:#888;">없음</span>'}</div>
      <div class="add-inline" style="padding:0;"><input type="text" id="new-category-input" placeholder="새 카테고리"><button class="btn btn-sm" data-action="add-category">+ 추가</button></div>
    </div>
  `;
}
async function sendToNotionInbox(text){
  if(!SETTINGS.workerUrl || !SETTINGS.inboxPageId) return false;
  try{
    const res = await fetch(SETTINGS.workerUrl.replace(/\/$/,'') + '/notion-inbox', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ pageId: SETTINGS.inboxPageId, text })
    });
    return res.ok;
  }catch(e){ return false; }
}
async function uploadPhotoToNotion(file, caption){
  if(!SETTINGS.workerUrl || !SETTINGS.inboxPageId) return false;
  try{
    const fd = new FormData();
    fd.append('pageId', SETTINGS.inboxPageId);
    fd.append('caption', caption);
    fd.append('file', file, file.name);
    const res = await fetch(SETTINGS.workerUrl.replace(/\/$/,'') + '/notion-photo', { method:'POST', body: fd });
    return res.ok;
  }catch(e){ return false; }
}

function exportXLSX(){
  const wb = XLSX.utils.book_new();
  const entrySheet = DATA.entries.map(e=>({ 날짜:e.date, 위치:locLabel(getLoc(e.locationId)), 카테고리:e.category||'', 내용:e.content,
    이슈여부:e.isIssue?'Y':'', 이슈상태:e.issueStatus||'', 첨부:(e.files||[]).join(', '), 노션전송:e.sentToNotion?'Y':'', ID:e.id }));
  const issueSheet = DATA.issues.map(i=>({ 제목:i.title, 위치:locLabel(getLoc(i.locationId)), 발생일:i.createdDate, 현재상태:issueCurrentStatus(i.id), ID:i.id }));
  wb.SheetNames.push('일지'); wb.Sheets['일지']=XLSX.utils.json_to_sheet(entrySheet);
  wb.SheetNames.push('이슈'); wb.Sheets['이슈']=XLSX.utils.json_to_sheet(issueSheet);
  const out = XLSX.write(wb,{bookType:'xlsx',type:'array'});
  downloadBlob(new Blob([out],{type:'application/octet-stream'}), `시설일지_${todayStr()}.xlsx`); showToast('엑셀 파일을 다운로드했습니다');
}
function downloadBlob(blob, filename){
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(url); a.remove();},500);
}
function handleImportFile(file){
  const reader = new FileReader();
  if(file.name.endsWith('.json')){
    reader.onload=()=>{ try{ mergeImport(JSON.parse(reader.result)); }catch(e){ showToast('JSON 파일을 읽지 못했습니다'); } };
    reader.readAsText(file);
  } else {
    reader.onload=()=>{
      try{
        const wb = XLSX.read(reader.result,{type:'array'});
        const entrySheet = wb.Sheets['일지']?XLSX.utils.sheet_to_json(wb.Sheets['일지']):[];
        const issueSheet = wb.Sheets['이슈']?XLSX.utils.sheet_to_json(wb.Sheets['이슈']):[];
        const incoming = {entries:[],issues:[],categories:[],locations:[]};
        issueSheet.forEach(row=>{ incoming.issues.push({id:row['ID']||uid(), title:row['제목'], locationId:null, createdDate:row['발생일'], _labelHint:row['위치']}); });
        entrySheet.forEach(row=>{ incoming.entries.push({id:row['ID']||uid(), date:row['날짜'], category:row['카테고리']||'', content:row['내용']||'',
          isIssue:row['이슈여부']==='Y', issueId:null, issueStatus:row['이슈상태']||null, files:(row['첨부']||'').split(',').map(s=>s.trim()).filter(Boolean),
          sentToNotion:row['노션전송']==='Y', _labelHint:row['위치'], _t:new Date().toISOString()}); });
        mergeImport(incoming, true);
      }catch(e){ showToast('엑셀 파일을 읽지 못했습니다'); }
    };
    reader.readAsArrayBuffer(file);
  }
}
function ensureLocationByLabel(label){
  if(!label) return null;
  let floor, room;
  if(label.includes(' / ')){ [floor,room]=label.split(' / '); } else { floor=label.replace(' (전체)','').trim(); room=''; }
  let loc = DATA.locations.find(l=>l.floor===floor && (l.room||'')===(room||''));
  if(!loc){ loc={id:uid(), floor, room:room||''}; DATA.locations.push(loc); }
  return loc.id;
}
function mergeImport(incoming, fromExcel){
  incoming.entries=incoming.entries||[]; incoming.issues=incoming.issues||[]; incoming.categories=incoming.categories||[]; incoming.locations=incoming.locations||[];
  if(fromExcel){
    incoming.issues.forEach(i=>{ i.locationId=ensureLocationByLabel(i._labelHint); });
    incoming.entries.forEach(e=>{ e.locationId=ensureLocationByLabel(e._labelHint); });
  } else {
    incoming.locations.forEach(l=>{ if(!DATA.locations.find(x=>x.id===l.id)) DATA.locations.push(l); });
  }
  incoming.categories.forEach(c=>{ if(!DATA.categories.includes(c)) DATA.categories.push(c); });
  incoming.issues.forEach(inc=>{ const idx=DATA.issues.findIndex(x=>x.id===inc.id); if(idx>=0) DATA.issues[idx]=inc; else DATA.issues.push(inc); });
  incoming.entries.forEach(inc=>{ const idx=DATA.entries.findIndex(x=>x.id===inc.id); if(idx>=0) DATA.entries[idx]=inc; else DATA.entries.push(inc); });
  saveData(); render(); showToast('가져오기를 완료했습니다');
}

/* ---- Markdown export + file storage via File System Access API ---- */
function sanitizeFilename(s){ return String(s).replace(/[\\/:*?"<>|]/g,'-').trim().slice(0,120) || 'untitled'; }
function safeNoteName(name){ return sanitizeFilename(String(name).replace(/#/g,'_')); }
function wikilink(name){ const safe=safeNoteName(name); return safe===String(name) ? `[[${safe}]]` : `[[${safe}|${esc_md(name)}]]`; }
function esc_md(s){ return String(s).replace(/\|/g,'\\|'); }
async function getOrCreateDir(parent, name){ return await parent.getDirectoryHandle(name, {create:true}); }
async function writeFile(dirH, filename, content){
  const fh = await dirH.getFileHandle(filename, {create:true}); const w = await fh.createWritable(); await w.write(content); await w.close();
}
async function writeFileBinary(dirH, filename, fileObj){
  const fh = await dirH.getFileHandle(filename, {create:true}); const w = await fh.createWritable(); await w.write(fileObj); await w.close();
}
function buildDailyMD(date, entries){
  let body = `---\ndate: ${date}\ntags: [일일일지]\n---\n# ${date} 일일일지\n\n`;
  entries.forEach(e=>{
    const loc=getLoc(e.locationId); const locName = loc?(loc.room||loc.floor):'미지정';
    body += `## ${loc?wikilink(locName):'미지정'}${e.category?(' · '+e.category):''}\n${e.content}\n`;
    if(e.isIssue) body += `#이슈 #${e.issueStatus}\n`;
    if(e.files&&e.files.length) e.files.forEach(f=>{ body += `![[${f}]]\n`; });
    body += `\n`;
  });
  return body;
}
function buildLocationMD(loc){
  if(loc.room){
    const es = entriesForLocation(loc.id).slice().reverse();
    let body = `---\nlocation: ${loc.room}\nfloor: ${loc.floor}\ntags: [위치]\n---\n# ${loc.room}\n\n${wikilink(loc.floor)}\n\n`;
    if(loc.info) body += `## 정보\n${loc.info}\n\n`;
    body += `## 타임라인\n`;
    es.forEach(e=>{ body += `- ${e.date} — ${e.content}`; if(e.isIssue) body += ` #이슈 #${e.issueStatus}`; body += `\n`; });
    return body;
  } else {
    const children = DATA.locations.filter(l=>l.floor===loc.floor && l.room);
    const es = entriesForLocation(loc.id).slice().reverse();
    let body = `---\nfloor: ${loc.floor}\ntags: [위치, 층]\n---\n# ${loc.floor}\n\n## 하위 설비\n`;
    children.forEach(c=>{ body += `- ${wikilink(c.room)}\n`; });
    body += `\n## 층 전체 기록\n`;
    es.forEach(e=>{ body += `- ${e.date} — ${e.content}\n`; });
    return body;
  }
}
function buildIssueMD(issue){
  const loc = getLoc(issue.locationId); const locName = loc?(loc.room||loc.floor):'';
  const es = entriesForIssue(issue.id); const status = issueCurrentStatus(issue.id);
  let body = `---\nlocation: ${locName}\nfloor: ${loc?loc.floor:''}\nstatus: ${status}\ncreated: ${issue.createdDate}\ntags: [이슈]\n---\n# ${issue.title}\n\n위치: ${loc?wikilink(locName):''}\n\n## 진행 상황\n`;
  es.forEach(e=>{ body += `- ${e.date} — ${e.issueStatus}: ${e.content}\n`; });
  return body;
}
async function exportMarkdown(){
  if(!dirHandle){ showToast('먼저 설정 탭에서 저장 위치를 선택해주세요'); return; }
  const rangeMode = document.querySelector('input[name="exrange"]:checked').value;
  let startD=null, endD=null;
  if(rangeMode==='range'){
    startD = document.getElementById('ex-start').value; endD = document.getElementById('ex-end').value;
    if(!startD||!endD){ showToast('시작일/종료일을 입력해주세요'); return; }
  }
  try{
    const dailyDir = await getOrCreateDir(dirHandle, '일일일지');
    const locDir = await getOrCreateDir(dirHandle, '위치');
    const issueDir = await getOrCreateDir(dirHandle, '이슈');
    let dates = [...new Set(DATA.entries.map(e=>e.date))];
    if(rangeMode==='range') dates = dates.filter(d=>d>=startD && d<=endD);
    for(const d of dates){
      const entries = DATA.entries.filter(e=>e.date===d).sort((a,b)=>a._t.localeCompare(b._t));
      await writeFile(dailyDir, sanitizeFilename(d)+'.md', buildDailyMD(d, entries));
    }
    let touchedLocIds = new Set(DATA.entries.filter(e=> rangeMode==='all' || (e.date>=startD && e.date<=endD)).map(e=>e.locationId));
    let locsToWrite = rangeMode==='all' ? DATA.locations : DATA.locations.filter(l=>touchedLocIds.has(l.id));
    for(const loc of locsToWrite){ await writeFile(locDir, safeNoteName(loc.room||loc.floor)+'.md', buildLocationMD(loc)); }
    let issuesToWrite = DATA.issues;
    if(rangeMode==='range') issuesToWrite = DATA.issues.filter(i=> entriesForIssue(i.id).some(e=>e.date>=startD && e.date<=endD));
    for(const issue of issuesToWrite){ await writeFile(issueDir, safeNoteName(issue.title)+'.md', buildIssueMD(issue)); }
    showToast(`내보내기 완료: 일지 ${dates.length}개 / 위치 ${locsToWrite.length}개 / 이슈 ${issuesToWrite.length}개`);
  }catch(err){ showToast('내보내기 중 오류: 권한을 다시 확인해주세요'); }
}

}

function bindGlobalEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', ()=>{ UI.tab=el.getAttribute('data-nav'); UI.selectedIssueId=null; UI.selectedLocId=null; render(); });

document.addEventListener('click', function(e){
  const t = e.target;
  if(t.closest('[data-action="open-entry-form"]')) return openEntryForm(null);
  if(t.closest('[data-action="close-modal"]')) return closeModal();
  if(t.closest('[data-action="save-entry"]')){ const id=t.closest('[data-action="save-entry"]').getAttribute('data-id'); return saveEntryFromForm(id||null); }
  if(t.closest('[data-action="delete-entry"]')){ if(confirm('이 항목을 삭제할까요?')){ const id=t.closest('[data-action="delete-entry"]').getAttribute('data-id'); return deleteEntry(id); } return; }
  if(t.closest('[data-edit-entry]')){ const id=t.closest('[data-edit-entry]').getAttribute('data-edit-entry'); return openEntryForm(id); }
  if(t.closest('[data-pick-date]')){ UI.selectedDate=t.closest('[data-pick-date]').getAttribute('data-pick-date'); return render(); }
  if(t.closest('[data-remove-file]')){ const i=+t.closest('[data-remove-file]').getAttribute('data-remove-file'); pendingFiles.splice(i,1); return renderFilesPreview(); }
  if(t.closest('[data-action="delete-loc"]')){
    e.stopPropagation();
    const id=t.closest('[data-action="delete-loc"]').getAttribute('data-id');
    const used = DATA.entries.some(en=>en.locationId===id);
    if(used && !confirm('이 위치를 참조하는 기록이 있습니다. 그래도 삭제할까요?')) return;
    DATA.locations = DATA.locations.filter(l=>l.id!==id); saveData(); render(); showToast('삭제되었습니다'); return;
  }
  if(t.closest('[data-open-issue]')){ UI.selectedIssueId=t.closest('[data-open-issue]').getAttribute('data-open-issue'); return render(); }
  if(t.closest('[data-action="back-to-issues"]')){ UI.selectedIssueId=null; return render(); }
  if(t.closest('[data-action="back-to-locations"]')){ UI.selectedLocId=null; return render(); }
  if(t.closest('[data-open-loc]')){ UI.selectedLocId=t.closest('[data-open-loc]').getAttribute('data-open-loc'); return render(); }
  if(t.closest('[data-action="open-loc"]')){ UI.selectedLocId=t.closest('[data-action="open-loc"]').getAttribute('data-id'); return render(); }
  if(t.closest('[data-toggle-floor]')){ const f=t.closest('[data-toggle-floor]').getAttribute('data-toggle-floor'); UI.openFloors[f]=!UI.openFloors[f]; return render(); }
  if(t.closest('[data-action="add-floor"]')){
    const inp=document.getElementById('new-floor-input'); const val=inp.value.trim();
    if(!val){ showToast('층 이름을 입력해주세요'); return; }
    if(DATA.locations.find(l=>l.floor===val && !l.room)){ showToast('이미 존재하는 층입니다'); return; }
    DATA.locations.push({id:uid(), floor:val, room:''}); saveData(); render(); showToast('층이 추가되었습니다'); return;
  }
  if(t.closest('[data-action="add-room"]')){
    const floor=t.closest('[data-action="add-room"]').getAttribute('data-floor');
    const inp=document.getElementById('new-room-'+floor); const val=inp.value.trim();
    if(!val){ showToast('설비명을 입력해주세요'); return; }
    DATA.locations.push({id:uid(), floor, room:val}); saveData(); render(); showToast('설비가 추가되었습니다'); return;
  }
  if(t.closest('[data-action="save-loc-info"]')){
    const id=t.closest('[data-action="save-loc-info"]').getAttribute('data-id'); const loc=getLoc(id);
    loc.info = document.getElementById('loc-info').value; saveData(); showToast('정보가 저장되었습니다'); return;
  }
  if(t.closest('[data-action="add-category"]')){
    const inp=document.getElementById('new-category-input'); const val=inp.value.trim();
    if(!val){ showToast('카테고리명을 입력해주세요'); return; }
    if(DATA.categories.includes(val)){ showToast('이미 있는 카테고리입니다'); return; }
    DATA.categories.push(val); saveData(); render(); showToast('카테고리가 추가되었습니다'); return;
  }
  if(t.closest('[data-action="delete-category"]')){
    const name=t.closest('[data-action="delete-category"]').getAttribute('data-name');
    DATA.categories = DATA.categories.filter(c=>c!==name); saveData(); render(); return;
  }
  if(t.closest('[data-action="export-json"]')) return exportJSON();
  if(t.closest('[data-action="export-xlsx"]')) return exportXLSX();
  if(t.closest('[data-action="trigger-import"]')) return document.getElementById('import-file').click();
  if(t.closest('[data-action="pick-folder"]')) return pickFolder();
  if(t.closest('[data-action="export-md"]')) return exportMarkdown();
  if(t.closest('[data-action="save-notion-settings"]')){
    SETTINGS.workerUrl = document.getElementById('s-worker-url').value.trim();
    SETTINGS.inboxPageId = document.getElementById('s-inbox-id').value.trim();
    saveSettings(); showToast('노션 연동 설정이 저장되었습니다'); return;
  }
  if(t.closest('[data-action="test-notion"]')){
    (async ()=>{
      SETTINGS.workerUrl = document.getElementById('s-worker-url').value.trim();
      SETTINGS.inboxPageId = document.getElementById('s-inbox-id').value.trim();
      saveSettings();
      showToast('테스트 전송 중...');
      const ok = await sendToNotionInbox('✅ 연결 테스트 — 이 줄은 지워도 됩니다 (' + new Date().toLocaleString('ko-KR') + ')');
      showToast(ok ? '연결 성공! 받은편지함을 확인해보세요.' : '연결 실패. Worker URL과 페이지 ID, Worker의 NOTION_TOKEN 설정을 확인해주세요.');
    })();
    return;
  }
});
