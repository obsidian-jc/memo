<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>원베일리 시설관리 간편입력</title>
<style>
  :root{
    --ink:#1c2230;
    --paper:#f6f4ee;
    --panel:#ffffff;
    --line:#d9d4c7;
    --orange:#d8571f;
    --green:#2f6b4f;
    --gray:#8a8578;
    --danger:#b3311c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 28px 28px;
    background-attachment: fixed;
    font-family: "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    color: var(--ink);
    min-height:100vh;
    padding: 18px 14px 60px;
  }
  .wrap{max-width:520px; margin:0 auto;}
  header{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:18px;
    padding-bottom:14px;
    border-bottom:3px solid var(--ink);
  }
  .gauge{
    width:46px;height:46px;border-radius:50%;
    border:4px solid var(--ink);
    display:flex;align-items:center;justify-content:center;
    background:var(--orange);
    flex-shrink:0;
  }
  .gauge svg{width:24px;height:24px;fill:var(--paper);}
  h1{font-size:20px; margin:0; line-height:1.3;}
  h1 span{display:block; font-size:12px; letter-spacing:2px; color:var(--gray); font-weight:700; text-transform:uppercase; margin-bottom:2px;}

  .card{
    background:var(--panel);
    border:2px solid var(--ink);
    border-radius:10px;
    padding:18px;
    margin-bottom:16px;
    box-shadow:4px 4px 0 var(--ink);
  }
  .label{font-size:15px; font-weight:700; margin-bottom:10px;}
  .sub{font-size:13px; color:var(--gray); margin-top:-4px; margin-bottom:12px;}

  input[type=text]{
    width:100%;
    padding:16px;
    font-size:20px;
    border:2px solid var(--ink);
    border-radius:8px;
    background:var(--paper);
    color:var(--ink);
    font-family:inherit;
  }
  textarea{
    width:100%;
    min-height:160px;
    padding:16px;
    font-size:19px;
    line-height:1.6;
    border:2px solid var(--ink);
    border-radius:8px;
    background:var(--paper);
    color:var(--ink);
    font-family:inherit;
    resize:vertical;
  }
  input::placeholder, textarea::placeholder{color:#a39d8c;}

  .pickrow{display:flex; gap:8px; flex-wrap:wrap;}
  .pick{
    flex:1 1 auto;
    min-width:90px;
    padding:14px 8px;
    font-size:16px;
    font-weight:700;
    text-align:center;
    border:2px solid var(--ink);
    border-radius:8px;
    background:var(--panel);
    color:var(--ink);
    cursor:pointer;
  }
  .pick.selected{background:var(--ink); color:var(--paper);}

  #saveBtn{
    width:100%;
    padding:20px;
    font-size:22px;
    font-weight:800;
    letter-spacing:1px;
    color:var(--paper);
    background:var(--orange);
    border:2px solid var(--ink);
    border-radius:10px;
    cursor:pointer;
    box-shadow:4px 4px 0 var(--ink);
  }
  #saveBtn:active{transform:translate(2px,2px); box-shadow:2px 2px 0 var(--ink);}
  #saveBtn:disabled{background:var(--gray); cursor:wait;}

  #status{
    margin-top:14px;
    padding:14px;
    border-radius:8px;
    font-size:16px;
    font-weight:600;
    display:none;
  }
  #status.ok{display:block; background:#e4f0e9; border:2px solid var(--green); color:var(--green);}
  #status.err{display:block; background:#f6e4e0; border:2px solid var(--danger); color:var(--danger);}
  #status.loading{display:block; background:#eee; border:2px solid var(--gray); color:var(--gray);}

  .photonote{
    font-size:12px;
    color:var(--gray);
    background:#fff;
    border:1px dashed var(--line);
    border-radius:6px;
    padding:8px 10px;
    margin-top:6px;
  }

  .recent{margin-top:22px;}
  .recent h2{font-size:14px; color:var(--gray); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;}
  .recent-item{
    background:var(--panel);
    border:1px solid var(--line);
    border-left:5px solid var(--orange);
    border-radius:6px;
    padding:10px 12px;
    margin-bottom:8px;
    font-size:14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="gauge">
      <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.2L9 6l-3 3-4.2-4.3C.6 7.1 1 10.1 3 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.4-.4.4-1.1 0-1.4z"/></svg>
    </div>
    <h1><span>원베일리 시설관리</span>간편 입력</h1>
  </header>

  <div class="card">
    <div class="label">제목</div>
    <input type="text" id="title" placeholder="예: 102동 펌프 소음 발생">
  </div>

  <div class="card">
    <div class="label">구분 (선택)</div>
    <div class="pickrow" id="kindRow">
      <div class="pick" data-val="점검">점검</div>
      <div class="pick" data-val="수리">수리</div>
      <div class="pick" data-val="메모">메모</div>
    </div>
  </div>

  <div class="card">
    <div class="label">상태 (선택)</div>
    <div class="pickrow" id="stateRow">
      <div class="pick selected" data-val="접수">접수</div>
      <div class="pick" data-val="진행중">진행중</div>
      <div class="pick" data-val="완료">완료</div>
    </div>
  </div>

  <div class="card">
    <div class="label">내용</div>
    <textarea id="content" placeholder="있었던 일을 자유롭게 적어주세요"></textarea>
    <div class="photonote">📷 사진은 이 앱에서 자동으로 안 옮겨져요. 폰 원드라이브 자동백업을 쓰시거나, Claude 채팅에 사진을 직접 올려주세요.</div>
  </div>

  <button id="saveBtn">노션 받은편지함에 저장</button>
  <div id="status"></div>

  <div class="recent" id="recentWrap" style="display:none;">
    <h2>이번 세션에 저장한 것</h2>
    <div id="recentList"></div>
  </div>
</div>

<script>
const INBOX_PAGE_ID = "38a69164a5ee81dd87b8ee0524c60eaf";

let selKind = "";
let selState = "접수";

document.querySelectorAll('#kindRow .pick').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('#kindRow .pick').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selKind = btn.dataset.val;
  });
});
document.querySelectorAll('#stateRow .pick').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('#stateRow .pick').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selState = btn.dataset.val;
  });
});

function showStatus(type, msg){
  const el = document.getElementById('status');
  el.className = type;
  el.textContent = msg;
}

function addRecent(title){
  const wrap = document.getElementById('recentWrap');
  wrap.style.display = 'block';
  const list = document.getElementById('recentList');
  const div = document.createElement('div');
  div.className = 'recent-item';
  div.textContent = title;
  list.prepend(div);
}

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const title = document.getElementById('title').value.trim();
  const content = document.getElementById('content').value.trim();

  if(!title){ showStatus('err','⚠ 제목을 입력해주세요.'); return; }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  showStatus('loading','저장 중입니다...');

  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth()+1).padStart(2,'0');
  const d = String(today.getDate()).padStart(2,'0');
  const dateStr = `${y}-${m}-${d}`;

  const kindPart = selKind ? ` (${selKind}/${selState})` : ` (${selState})`;
  const lineText = `[${dateStr}] ${title}${kindPart}` + (content ? ` — ${content}` : '');

  const prompt = `노션 페이지(page_id: ${INBOX_PAGE_ID}, "받은편지함")를 업데이트해줘.
notion-update-page 도구의 update_content 명령을 사용해서, old_str에 정확히 "## 새로 들어온 내용" 이 문자열을 넣고, new_str에는 "## 새로 들어온 내용\\n- ${lineText.replace(/"/g,'\\\\"')}" 를 넣어서 호출해줘.
다른 설명 없이 도구만 호출해.`;

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }],
        mcp_servers: [
          { type: "url", url: "https://mcp.notion.com/mcp", name: "notion-mcp" }
        ]
      })
    });

    const data = await response.json();
    const toolUses = (data.content || []).filter(b => b.type === "mcp_tool_use");
    const toolResults = (data.content || []).filter(b => b.type === "mcp_tool_result");
    const hadError = toolResults.some(r => r.is_error);

    if(toolUses.length > 0 && !hadError){
      showStatus('ok', '✅ 받은편지함에 저장됐어요!');
      addRecent(lineText);
      document.getElementById('title').value='';
      document.getElementById('content').value='';
    } else {
      showStatus('err', '❌ 저장에 실패했습니다. 다시 시도해주세요.');
      console.error(data);
    }
  } catch(err){
    showStatus('err', '❌ 오류가 발생했습니다: ' + err.message);
    console.error(err);
  } finally {
    saveBtn.disabled = false;
  }
});
</script>
</body>
</html>
